# Akamai Cloud Solutions Architect agent on a single Linode.
# Anthropic as the model provider. No GPU, no LKE.
#
# Build and push the image first (see the agent README and
# deploy/scripts/build_and_push.sh), then set .env and bring this up:
#   docker compose up -d

services:
  agent:
    image: ghcr.io/REPLACE_you/akamai-sa-agent:latest
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      MODEL_PROVIDER: anthropic
    restart: unless-stopped
    healthcheck:
      # python:slim has no curl; use the interpreter that is already in the image.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/healthz').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
