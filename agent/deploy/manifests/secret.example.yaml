# The agent's secrets. Copy to secret.yaml and fill in, or build it from your
# .env with scripts/make_secret.sh. secret.yaml is gitignored; this example is not.
apiVersion: v1
kind: Secret
metadata:
  name: akamai-sa-agent-secrets
  namespace: akamai-sa-agent
type: Opaque
stringData:
  # Read-only Linode API token (the akamai-cloud-mcp reads use it).
  LINODE_TOKEN: "REPLACE_with_a_read_only_linode_token"
  # In-cluster vLLM endpoint (OpenAI-compatible /v1). Use the service DNS, e.g.
  # http://vllm.<vllm-namespace>.svc.cluster.local:8000/v1
  VLLM_BASE_URL: "http://REPLACE_vllm_service.<vllm-namespace>.svc.cluster.local:8000/v1"
  VLLM_API_KEY: "placeholder"
  # Discord bot token (Developer Portal -> your app -> Bot -> Reset Token).
  DISCORD_TOKEN: "REPLACE_with_your_discord_bot_token"
  # Akamai Object Storage for durable conversation sessions (SESSION_BACKEND=s3).
  SESSION_BUCKET: "REPLACE_with_your_sessions_bucket"
  SESSION_CLUSTER: "REPLACE_e.g._us-sea-1"
  SESSION_ACCESS_KEY: "REPLACE_with_object_storage_access_key"
  SESSION_SECRET_KEY: "REPLACE_with_object_storage_secret_key"
  # Long-term memory: Akamai Managed PostgreSQL connection string. Omit to disable.
  DATABASE_URL: "postgresql://USER:PASSWORD@HOST:PORT/defaultdb?sslmode=require"
