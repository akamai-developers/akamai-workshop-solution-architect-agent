<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Module 3 overview</title>
<style>
  :root {
    --navy:#1b1a3d; --purple:#6c5ce7; --peach:#fbe6d2; --peach-b:#f1cba0;
    --grey:#eef0f4; --grey-b:#e2e3ea; --ink:#1b1a3d; --muted:#5c5c74; --line:#9a9ab0;
  }
  * { box-sizing:border-box; margin:0; padding:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; }
  body { background:#ffffff; }
  #diagram { width:1020px; padding:34px 40px 30px; background:#ffffff; color:var(--ink); }
  .kicker { font-size:12px; font-weight:700; letter-spacing:.06em; text-transform:uppercase;
            color:var(--muted); margin-bottom:6px; }

  .stage { position:relative; width:940px; height:392px; }
  .wires { position:absolute; inset:0; width:940px; height:392px; }
  .node { position:absolute; border-radius:12px; display:flex; flex-direction:column;
          align-items:center; justify-content:center; text-align:center; padding:8px; }
  .node .t { font-size:13.5px; font-weight:700; }
  .node .s { font-size:10.5px; opacity:.9; margin-top:4px; }
  .io     { background:#fff; border:1.5px solid var(--navy); color:var(--navy); }
  .gr     { background:var(--purple); color:#fff; box-shadow:0 0 0 4px rgba(108,92,231,.14); }
  .agent  { background:var(--navy); color:#fff; }
  .tools  { background:var(--grey); border:1px solid var(--grey-b); color:var(--ink); }
  .wires text { fill:var(--muted); font-size:11px; font-weight:700; }
  .wires text.cap { font-size:10.5px; font-weight:600; }
</style>
</head>
<body>
  <div id="diagram">
    <div class="kicker">Module 3 &nbsp;&middot;&nbsp; Three guardrails, one per boundary</div>

    <div class="stage">
      <svg class="wires" viewBox="0 0 940 392">
        <defs>
          <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
            <path d="M0,0 L10,5 L0,10 z" fill="#9a9ab0"/>
          </marker>
        </defs>
        <!-- main flow -->
        <path d="M120,96 L158,96" fill="none" stroke="#9a9ab0" stroke-width="2" marker-end="url(#ar)"/>
        <path d="M356,96 L398,96" fill="none" stroke="#9a9ab0" stroke-width="2" marker-end="url(#ar)"/>
        <path d="M548,96 L590,96" fill="none" stroke="#9a9ab0" stroke-width="2" marker-end="url(#ar)"/>
        <path d="M786,96 L824,96" fill="none" stroke="#9a9ab0" stroke-width="2" marker-end="url(#ar)"/>
        <!-- branch to the approval gate -->
        <path d="M473,134 L473,206" fill="none" stroke="#9a9ab0" stroke-width="2" marker-end="url(#ar)"/>
        <text x="483" y="174" text-anchor="start">tool call</text>
        <path d="M473,278 L473,314" fill="none" stroke="#9a9ab0" stroke-width="2" marker-end="url(#ar)"/>
        <text x="483" y="300" text-anchor="start">if approved</text>
        <!-- captions under the guardrails -->
        <text x="257" y="150" text-anchor="middle" class="cap">prompt injection, off-topic, PII</text>
        <text x="688" y="150" text-anchor="middle" class="cap">leaked secrets, PII</text>
        <text x="585" y="247" text-anchor="start" class="cap">gates writes, deny by default</text>
      </svg>

      <div class="node io"    style="left:8px;   top:70px;  width:112px; height:54px;"><div class="t">Request</div><div class="s">from user</div></div>
      <div class="node gr"    style="left:160px; top:64px;  width:196px; height:66px;"><div class="t">Input guardrail</div><div class="s">BeforeInvocationEvent</div></div>
      <div class="node agent" style="left:400px; top:64px;  width:146px; height:66px;"><div class="t">Agent</div></div>
      <div class="node gr"    style="left:590px; top:64px;  width:196px; height:66px;"><div class="t">Output guardrail</div><div class="s">AfterInvocationEvent</div></div>
      <div class="node io"    style="left:826px; top:70px;  width:112px; height:54px;"><div class="t">Response</div><div class="s">to user</div></div>

      <div class="node gr"    style="left:378px; top:206px; width:190px; height:68px;"><div class="t">Approval gate</div><div class="s">BeforeToolCallEvent</div></div>
      <div class="node tools" style="left:400px; top:314px; width:146px; height:54px;"><div class="t">Write tools</div></div>
    </div>
  </div>
</body>
</html>
