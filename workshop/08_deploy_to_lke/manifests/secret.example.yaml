# The agent's secrets. Copy to secret.yaml and fill in, or build it from your
# .env with scripts/make_secret.sh. secret.yaml is gitignored; this example is not.
apiVersion: v1
kind: Secret
metadata:
  name: akamai-sa-agent-secrets
  namespace: akamai-sa-agent
type: Opaque
stringData:
  # Read-only Linode API token (the akamai-cloud-mcp reads use it).
  LINODE_TOKEN: "REPLACE_with_a_read_only_linode_token"
  # Your self-hosted vLLM endpoint (OpenAI-compatible /v1).
  VLLM_BASE_URL: "http://REPLACE_with_your_vllm_ip/v1"
  VLLM_API_KEY: "placeholder"
  # Akamai Object Storage keys for durable sessions (from Module 4).
  SESSION_BUCKET: "REPLACE_with_your_sessions_bucket"
  SESSION_ACCESS_KEY: "REPLACE_with_object_storage_access_key"
  SESSION_SECRET_KEY: "REPLACE_with_object_storage_secret_key"
